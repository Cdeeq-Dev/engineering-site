<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice - NexVolt Engineering</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="invoice.css">
</head>
<body>
    <!-- Navigation (hidden on print) -->
    <nav class="navbar no-print">
        <div class="container">
            <a href="index.html" class="logo" style="text-decoration:none;">⚡ NexVolt Engineering</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="hamburger" aria-label="Toggle navigation">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <div class="invoice-page-wrap">
        <div class="invoice-actions no-print">
            <button class="btn btn-primary" id="printBtn">🖨️ Print Invoice</button>
            <a href="index.html" class="btn btn-secondary">Back to Home</a>
        </div>

        <div class="invoice-card" id="invoiceCard">
            <div class="invoice-loading" id="invoiceLoading">Loading your invoice...</div>
        </div>

        <div class="print-modal-overlay no-print" id="printPromptOverlay" aria-hidden="true">
            <div class="print-modal" role="dialog" aria-modal="true" aria-labelledby="printPromptTitle">
                <div class="print-modal-icon">✅</div>
                <h3 id="printPromptTitle">Payment Successful</h3>
                <p>Your receipt is ready from NexVolt Engineering Ltd. Would you like to print your slip now?</p>
                <div class="print-modal-actions">
                    <button class="btn btn-secondary" id="printPromptCancel">No, Thanks</button>
                    <button class="btn btn-primary" id="printPromptPrint">Print Slip</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer no-print">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; NexVolt Engineering Ltd. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="invoice.js"></script>
    <script>
        const invoiceHamburger = document.querySelector('.navbar .hamburger');
        const invoiceNavLinks = document.querySelector('.navbar .nav-links');

        if (invoiceHamburger && invoiceNavLinks) {
            invoiceHamburger.addEventListener('click', () => {
                const isOpen = invoiceNavLinks.classList.toggle('open');
                invoiceNavLinks.style.display = isOpen ? 'flex' : 'none';
            });

            document.querySelectorAll('.navbar .nav-links a').forEach((link) => {
                link.addEventListener('click', () => {
                    if (window.innerWidth <= 768) {
                        invoiceNavLinks.classList.remove('open');
                        invoiceNavLinks.style.display = 'none';
                    }
                });
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth > 768) {
                    invoiceNavLinks.classList.remove('open');
                    invoiceNavLinks.style.display = 'flex';
                } else if (!invoiceNavLinks.classList.contains('open')) {
                    invoiceNavLinks.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
