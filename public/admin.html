<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NexVolt Engineering</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="admin.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">⚡ NexVolt Engineering — Admin</div>
            <button class="btn btn-secondary" id="logoutBtn" style="padding:0.5rem 1.1rem;">Log Out</button>
        </div>
    </nav>

    <div class="admin-wrap">
        <div class="container">
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="clients">📋 Client Messages</button>
                <button class="admin-tab" data-tab="invoices">🧾 Invoices</button>
            </div>

            <!-- CLIENTS TAB -->
            <div id="clientsTab" class="admin-tab-panel">
                <div class="admin-stats" id="clientStats"></div>
                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Organisation</th>
                                <th>Contact</th>
                                <th>Service Requested</th>
                                <th>Message</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="clientsTableBody">
                            <tr><td colspan="7" class="loading-row">Loading client messages...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- INVOICES TAB -->
            <div id="invoicesTab" class="admin-tab-panel" style="display:none;">
                <div class="admin-table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Invoice #</th>
                                <th>Client</th>
                                <th>Service</th>
                                <th>Amount</th>
                                <th>Start → End</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="invoicesTableBody">
                            <tr><td colspan="7" class="loading-row">Loading invoices...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
